# ===========================================================================
# ARK Intelligence v3 — Docker Compose
# ===========================================================================
#
# Usage:
#   cp .env.example .env    # Configure your tokens
#   docker compose up -d    # Start in background
#   docker compose logs -f  # Follow logs
#   docker compose down     # Stop gracefully
#
# Data persists in the 'botdata' volume across restarts.
# ===========================================================================



services:
  ark-intelligent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ark-intelligent
    restart: unless-stopped

    # Environment variables
    env_file:
      - .env

    environment:
      - TZ=Asia/Jakarta
      - DATA_DIR=/app/data

    # Persistent storage for BadgerDB
    volumes:
      - botdata:/app/data

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

    # Logging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # Health check — HTTP liveness probe
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  botdata:
    driver: local
